name: STK Neko Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Setup Android SDK (Minimal)
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Install Specific NDK Version
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install "ndk;25.0.8775105"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.0.8775105" >> $GITHUB_ENV
          echo "NDK=$ANDROID_SDK_ROOT/ndk/25.0.8775105" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils curl wget git

      - name: Make scripts executable
        run: |
          find buildScript libcore -type f -name "*.sh" -exec chmod +x {} +

      - name: Prebuild Assets and Libcore
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK: ${{ env.NDK }}
        run: |
          bash buildScript/fdroid/prebuild.sh

      - name: Build with Gradle
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK: ${{ env.NDK }}
        run: |
          ./gradlew assembleDebug --stacktrace

      - name: Show generated APKs
        run: |
          echo "Searching for APK files..."
          find . -type f \( -name "*.apk" -o -name "*.aab" \) | sort || true
          echo "Listing app/build/outputs ..."
          ls -R app/build/outputs || true

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: STK-Neko-build-outputs
          path: |
            **/*.apk
            **/*.aab
          if-no-files-found: warn
